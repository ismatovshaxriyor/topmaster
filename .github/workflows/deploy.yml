name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Run lint + tests on every push and PR ─────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: topmaster
          POSTGRES_USER: topmaster
          POSTGRES_PASSWORD: topmaster
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U topmaster"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Test settings use in-memory cache/channels/storage — only Postgres is needed.
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-secret-key-not-for-prod
      DEBUG: "False"
      POSTGRES_DB: topmaster
      POSTGRES_USER: topmaster
      POSTGRES_PASSWORD: topmaster
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      USE_S3: "False"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check apps config

      - name: Run tests
        run: pytest -q

  # ── Deploy to EC2 on push to main (after tests pass) ──────────────
  deploy:
    needs: test
    # Activates only once the server is ready: set repository variable
    # DEPLOY_ENABLED=true (Settings → Secrets and variables → Actions → Variables).
    # Until then this job is skipped, so main stays green.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd /opt/topmaster
            ./scripts/deploy.sh
