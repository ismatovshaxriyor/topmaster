# TopMaster reverse proxy. Domain is hard-coded — if it changes, update both
# this file and deploy/init-letsencrypt.sh, then re-issue the certificate.

# WebSocket upgrade mapping (this file is included inside the http {} context).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream topmaster_app {
    server web:8000;
}

# ── HTTP :80 — ACME challenge + redirect everything to HTTPS ───────
server {
    listen 80;
    listen [::]:80;
    server_name topmaster.ismatov.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — application + media ───────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name topmaster.ismatov.uz;

    ssl_certificate     /etc/letsencrypt/live/topmaster.ismatov.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/topmaster.ismatov.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers (HSTS is also set by Django; harmless to repeat).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # File uploads: avatars, portfolio images, job images.
    client_max_body_size 25m;

    # Media: proxy the public bucket path straight to MinIO (path-style URLs).
    location /topmaster-media/ {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    # Application: REST API, admin, Swagger, and WebSocket (/ws/...).
    location / {
        proxy_pass http://topmaster_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
