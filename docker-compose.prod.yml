name: topmaster-prod

# Production stack for a single EC2 host. Everything runs in Docker:
# Postgres + Redis + MinIO + Django (gunicorn/uvicorn) + Celery + Nginx (TLS).
# Data services expose NO host ports — only Nginx publishes 80/443.
# Start: docker compose -f docker-compose.prod.yml up -d --build --wait
# TLS:   ./deploy/init-letsencrypt.sh   (first time only)

x-django: &django
  build:
    context: .
    args:
      INSTALL_DEV: "false"
  image: topmaster-prod:latest
  env_file: .env
  environment:
    DJANGO_SETTINGS_MODULE: config.settings.prod
  restart: unless-stopped

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-topmaster}
      POSTGRES_USER: ${POSTGRES_USER:-topmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-topmaster}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-topmaster}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - miniodata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-topmaster} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET:-topmaster-media};
      mc anonymous set download local/${MINIO_BUCKET:-topmaster-media};
      echo 'MinIO bucket ready';
      "
    restart: "no"

  web:
    <<: *django
    command: >
      gunicorn config.asgi:application
      -k uvicorn.workers.UvicornWorker
      -w ${GUNICORN_WORKERS:-3}
      -b 0.0.0.0:8000
      --timeout 120 --access-logfile - --error-logfile -
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      RUN_MIGRATIONS: "true"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # Send X-Forwarded-Proto so SECURE_SSL_REDIRECT returns 200, not 301.
      test: ["CMD", "curl", "-fsS", "-H", "X-Forwarded-Proto: https", "http://localhost:8000/health/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  celery_worker:
    <<: *django
    command: celery -A config worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery_beat:
    <<: *django
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    depends_on:
      - web
    restart: unless-stopped
    # Reload every 6h so renewed certificates are picked up automatically.
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    restart: unless-stopped
    # Attempt renewal twice a day; certbot only renews when near expiry.
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;"

volumes:
  pgdata:
  redisdata:
  miniodata:
