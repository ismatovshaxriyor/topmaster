name: topmaster

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-topmaster}
      POSTGRES_USER: ${POSTGRES_USER:-topmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-topmaster}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-topmaster}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-topmaster}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-topmaster-secret}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-topmaster} ${MINIO_ROOT_PASSWORD:-topmaster-secret};
      mc mb --ignore-existing local/${MINIO_BUCKET:-topmaster-media};
      mc anonymous set download local/${MINIO_BUCKET:-topmaster-media};
      echo 'MinIO bucket ready';
      "

  web:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - .:/app
      - media:/app/media
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 10

  celery_worker:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    command: celery -A config worker -l info
    volumes:
      - .:/app
      - media:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery_beat:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    profiles: ["dev"]

volumes:
  pgdata:
  miniodata:
  media:
